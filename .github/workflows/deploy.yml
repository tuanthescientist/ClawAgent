name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t clawagent:latest .
    
    - name: Run tests in Docker
      run: |
        docker run --rm clawagent:latest pytest tests/ -v
